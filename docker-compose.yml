version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skyonline_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sky_online
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: skyonline_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sky_online
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-next
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    container_name: skyonline_frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
      API_URL: "http://backend:5000"
    depends_on:
      - backend

volumes:
  pgdata:
